# Render Blueprint -- https://render.com/docs/blueprint-spec
# Deploy: push this repo, then in the Render dashboard choose
# "New +" -> "Blueprint" and point it at this repo. Render reads this file.
services:
  - type: web
    name: stats-and-more
    runtime: python
    plan: free
    # App code lives in Python/; build and start commands run from there.
    rootDir: Python
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    # Render probes this for zero-downtime deploys; app.py returns 200 here.
    healthCheckPath: /healthz
    envVars:
      # Match the version pinned in .python-version / pyproject.toml.
      - key: PYTHON_VERSION
        value: 3.14.5
      - key: PYTHONUNBUFFERED
        value: "1"
