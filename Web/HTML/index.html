<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stats-and-more</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="stylesheet" href="../CSS/styles.css">
</head>

<body>
<main class="card">
    <h1 id="title">stats-and-more</h1>
    <p class="text">Pick a column from <code>data.csv</code> and get its descriptive stats.</p>

    <div class="controls">
        <select id="column" aria-label="Column to analyze">
            <option value="">Loading columns…</option>
        </select>
        <button id="analyze" disabled>Analyze</button>
    </div>

    <p id="status" class="status"></p>

    <table id="results" hidden>
        <tbody></tbody>
    </table>
</main>

<script src="../TS/script.js"></script>
</body>
</html>
